<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="icon" type="image/x-icon" href="/logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button id="menu-toggle" class="menu-toggle" aria-label="Open menu">☰</button>

  <aside id="side-menu" class="side-menu">
    <button id="menu-close" class="menu-close" aria-label="Close menu">×</button>
    <h3>Menu</h3>
    <a href="/dashboard">Dashboard</a>
    <a href="/full-schedule">Full Schedule</a>
  </aside>

  <div id="menu-overlay" class="menu-overlay"></div>

  <div class="dashboard">

    <h1>Dashboard</h1>

    <div class="grid">

      <div class="card">
        <h2>📚 Classes</h2>
        <ul id="classes"></ul>
      </div>

      <div class="card">
        <div class="card-header-row">
          <h2>📝 Assignments</h2>
          <button id="assignment-refresh" class="refresh-btn" title="Refresh assignments">↻</button>
        </div>

        <p id="selected-course" class="selected-course">Select a class to view assignments.</p>

        <div class="assignment-tabs">
          <button class="tab-btn active" data-assignment-filter="all">All</button>
          <button class="tab-btn" data-assignment-filter="unturned">Unturned In</button>
          <button class="tab-btn" data-assignment-filter="upcoming">Upcoming</button>
        </div>

        <div id="assignment-loader" class="loader hidden"></div>
        <ul id="assignments"></ul>
      </div>

      <div class="card card-wide">
        <div class="card-header-row">
          <h2>📅 Upcoming Events by Category</h2>
          <button id="calendar-refresh" class="refresh-btn" title="Refresh calendar">↻</button>
        </div>
        <div id="calendar-loader" class="loader hidden"></div>
        <div class="event-groups" id="event-groups"></div>
        <a href="/full-schedule" class="see-more-link">See more →</a>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
